name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: "20"
  DATABASE_URL: ${{ secrets.DATABASE_URL }}
  JWT_SECRET: ${{ secrets.JWT_SECRET || 'ci-test-secret-that-is-at-least-32-characters-long' }}
  NEXT_PUBLIC_APP_URL: ${{ secrets.NEXT_PUBLIC_APP_URL || 'http://localhost:3000' }}
  RAZORPAY_WEBHOOK_SECRET: ${{ secrets.RAZORPAY_WEBHOOK_SECRET || '' }}
  SENTRY_DSN: ${{ secrets.SENTRY_DSN || '' }}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint & TypeScript
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
      - run: npm ci
      - run: npm run lint
      - run: npx tsc --noEmit

  unit-test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
      - run: npm ci
      - run: npm test

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, unit-test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
      - run: npm ci
      - run: npm run build
      - uses: actions/upload-artifact@v4
        with:
          name: next-build
          path: .next/
          retention-days: 1

  e2e-test:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: [build]
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: workforce
          POSTGRES_PASSWORD: workforce
          POSTGRES_DB: workforce_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
      - run: npm ci
      - uses: actions/download-artifact@v4
        with:
          name: next-build
          path: .next/
      - name: Start app server
        run: |
          DATABASE_URL="postgresql://workforce:workforce@localhost:5432/workforce_test" \
          JWT_SECRET="ci-e2e-test-secret-that-is-at-least-32-characters-long" \
          npx prisma db push --skip-generate &
          npm run start &
          sleep 5
        env:
          NODE_ENV: test
      - name: Run Playwright tests
        run: npx playwright test --reporter=list
        env:
          E2E_BASE_URL: http://localhost:3000
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  invariant-test:
    name: Business Invariant Tests
    runs-on: ubuntu-latest
    needs: [build]
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: workforce
          POSTGRES_PASSWORD: workforce
          POSTGRES_DB: workforce_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
      - run: npm ci
      - run: npx prisma db push --skip-generate
        env:
          DATABASE_URL: "postgresql://workforce:workforce@localhost:5432/workforce_test"
      - name: Run invariant tests
        run: npm run test:invariants
        env:
          DATABASE_URL: "postgresql://workforce:workforce@localhost:5432/workforce_test"
          JWT_SECRET: ${{ env.JWT_SECRET }}
          NODE_ENV: test
      - name: Check for invariant failures
        if: failure()
        run: echo "Business invariants failed — deployment blocked"
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: invariant-report
          path: tests/reporting/
          retention-days: 7

  smoke-test:
    name: k6 Smoke Test
    runs-on: ubuntu-latest
    needs: [build, e2e-test, invariant-test]
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: workforce
          POSTGRES_PASSWORD: workforce
          POSTGRES_DB: workforce_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
      - run: npm ci
      - uses: actions/download-artifact@v4
        with:
          name: next-build
          path: .next/
      - name: Start app server
        run: |
          DATABASE_URL="postgresql://workforce:workforce@localhost:5432/workforce_test" \
          JWT_SECRET="ci-e2e-test-secret-that-is-at-least-32-characters-long" \
          npm run start &
          sleep 5
        env:
          NODE_ENV: test
      - name: Install k6
        run: |
          sudo apt-get update
          sudo apt-get install -y k6 || (curl -L https://github.com/grafana/k6/releases/download/v0.54.0/k6-v0.54.0-linux-amd64.tar.gz | tar xz --strip-components=1 -C /usr/local/bin)
      - name: Run k6 smoke test
        run: k6 run tests/load/smoke-test.js --tag "ci=true" --tag "sha=${{ github.sha }}"
        env:
          BASE_URL: "http://localhost:3000"
      - name: Post-test invariant certification
        run: npm run test:certify
        env:
          DATABASE_URL: "postgresql://workforce:workforce@localhost:5432/workforce_test"
          JWT_SECRET: ${{ env.JWT_SECRET }}
          NODE_ENV: test
      - name: Generate certification report
            run: node tests/reporting/generate-report.mjs
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: certification-report
          path: tests/reporting/certification-report-final.json
          retention-days: 30
      - name: Fail on certification failure
        if: failure()
        run: |
          echo "================================================"
          echo "  CERTIFICATION FAILED — DEPLOYMENT BLOCKED"
          echo "================================================"
          exit 1

  dependency-scan:
    name: Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
      - run: npm ci
      - run: npm audit --production || true

  deploy-preview:
    name: Deploy Preview
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    needs: [build, e2e-test, smoke-test, dependency-scan]
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to Vercel Preview
        run: |
          npx vercel deploy \
            --token=${{ secrets.VERCEL_TOKEN }} \
            --scope=${{ secrets.VERCEL_ORG_ID }} \
            --build-env NODE_ENV=production \
            --prebuilt \
            --archive=tgz \
            --yes
        continue-on-error: true

  deploy-production:
    name: Deploy Production
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    needs: [build, e2e-test, smoke-test, dependency-scan]
    environment: production
    steps:
      - uses: actions/checkout@v4
      - name: Verify production env vars
        run: |
          echo "Checking required production environment variables..."
          REQUIRED_VARS="NEXT_PUBLIC_APP_URL"
          MISSING=""
          for VAR in $REQUIRED_VARS; do
            if [ -z "${!VAR}" ]; then
              MISSING="$MISSING $VAR"
            fi
          done
          if [ -n "$MISSING" ]; then
            echo "❌ Missing required env vars:$MISSING"
            exit 1
          fi
          echo "✅ All required production env vars are set"
        env:
          NEXT_PUBLIC_APP_URL: ${{ secrets.NEXT_PUBLIC_APP_URL }}
      - name: Deploy to Vercel Production
        id: deploy
        run: |
          npx vercel deploy \
            --token=${{ secrets.VERCEL_TOKEN }} \
            --scope=${{ secrets.VERCEL_ORG_ID }} \
            --prod \
            --build-env NODE_ENV=production \
            --prebuilt \
            --archive=tgz \
            --yes 2>&1 | tee /tmp/vercel-deploy.log
          DEPLOY_URL=$(grep -oE 'https://[^ ]+' /tmp/vercel-deploy.log | head -1)
          echo "deploy_url=$DEPLOY_URL" >> $GITHUB_OUTPUT
      - name: Verify production deployment
        run: |
          DEPLOY_URL="${{ steps.deploy.outputs.deploy_url }}"
          if [ -z "$DEPLOY_URL" ]; then
            DEPLOY_URL="https://work-force1-ivory.vercel.app"
          fi
          echo "Verifying deployment at $DEPLOY_URL"
          sleep 15
          curl --fail --retry 5 --retry-delay 10 --retry-max-time 120 \
            -sS "$DEPLOY_URL/api/health" | grep -q '"status":"ok"'
          echo "Deployment verified successfully"
      - name: Tag release
        run: |
          git tag v$(node -p "require('./package.json').version")-$(date +%Y%m%d%H%M)
          git push origin --tags || true
